<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Si-Forma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gray-100 pb-10">

    <nav class="bg-indigo-900 text-white p-4 sticky top-0 z-50 shadow-md">
        <h1 class="text-lg font-bold text-center">Panel Admin RT 07</h1>
    </nav>

    <div class="container mx-auto px-4 mt-6">
        
        <div class="bg-white rounded-xl shadow-lg p-5 mb-6 border-t-4 border-indigo-500">
            <h2 class="text-xl font-bold mb-4 text-gray-800">Update Keuangan</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Saldo Awal (Rp)</label>
                    <input type="number" id="inp-saldo-awal" class="w-full p-3 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-indigo-400 outline-none" placeholder="Contoh: 1609000">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Total Pengeluaran (Rp)</label>
                    <input type="number" id="inp-pengeluaran" class="w-full p-3 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-indigo-400 outline-none" placeholder="Contoh: 400000">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Saldo Akhir (Rp)</label>
                    <input type="number" id="inp-saldo-akhir" class="w-full p-3 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-indigo-400 outline-none" placeholder="Otomatis terhitung?">
                </div>
                
                <button onclick="updateKeuangan()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition transform active:scale-95">
                    SIMPAN KE DATABASE
                </button>
            </div>
        </div>

    </div>

    <script>
        // KONFIGURASI FIREBASE (PASTIKAN INI BENAR)
        const firebaseConfig = {
            const firebaseConfig = {
            apiKey: "AIzaSyAAL75CTTo_-N6Bci9lpwIWiibwwvrqE6M",
            authDomain: "si-forma-rt07-rw04.firebaseapp.com",
            projectId: "si-forma-rt07-rw04",
            storageBucket: "si-forma-rt07-rw04.firebasestorage.app",
            messagingSenderId: "204795872669",
            appId: "1:204795872669:web:64145657180833c16c5b74",
            measurementId: "G-XVVLNX0C62"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // FUNGSI UPDATE KE FIREBASE
        function updateKeuangan() {
            const sAwal = document.getElementById('inp-saldo-awal').value;
            const pengeluaran = document.getElementById('inp-pengeluaran').value;
            const sAkhir = document.getElementById('inp-saldo-akhir').value;

            if(!sAwal || !pengeluaran) {
                alert("Mohon isi semua data!");
                return;
            }

            db.ref('RT07/keuangan').set({
                saldoAwal: sAwal,
                totalPengeluaran: pengeluaran,
                saldoAkhir: sAkhir,
                lastUpdate: new Date().toLocaleString('id-ID')
            })
            .then(() => {
                alert("✅ BERHASIL! Data sudah terkirim ke Database.");
            })
            .catch((error) => {
                alert("❌ GAGAL: " + error.message);
            });
        }
    </script>
</body>
</html>
